apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: whatsapp-agent-ingress
  annotations:
    kubernetes.io/ingress.class: "nginx"
    # add cert-manager annotations here if you use it for SSL
spec:
  rules:
    - host: your-domain.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: whatsapp-backend-service
                port:
                  number: 3001
          - path: /
            pathType: Prefix
            backend:
              service:
                name: whatsapp-frontend-service
                port:
                  number: 3000
